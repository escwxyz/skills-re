name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || (github.ref == 'refs/heads/main' && 'prod' || github.ref_name) }}

jobs:
  deploy:
    if: github.event.action != 'closed'
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.1.0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Create alchemy local config
        run: |
          mkdir -p apps/web/.alchemy/local
          printf '{"name":"skills-re-web","compatibility_date":"2026-03-10","compatibility_flags":["nodejs_compat","nodejs_compat_populate_process_env"]}' \
            > apps/web/.alchemy/local/wrangler.jsonc

      - name: Build
        run: bun run build
        env:
          PUBLIC_SERVER_URL: ${{ vars.PUBLIC_SERVER_URL }}

      - name: Seed alchemy profile
        if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'trusted-deploy')
        run: |
          mkdir -p "$HOME/.alchemy/credentials/default"
          printf '{"version":1,"profiles":{"default":{"cloudflare":{"metadata":{"id":"%s","name":"skills-re"},"method":"api-token"}}}}' \
            "$CLOUDFLARE_ACCOUNT_ID" > "$HOME/.alchemy/config.json"
          printf '{"type":"api-token","apiToken":"%s"}' \
            "$CLOUDFLARE_API_TOKEN" > "$HOME/.alchemy/credentials/default/cloudflare.json"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'trusted-deploy')
        working-directory: packages/infra
        run: bun alchemy deploy --stage ${{ env.STAGE }}
        env:
          ALCHEMY_PROFILE: default
          NODE_ENV: production
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_GATEWAY: ${{ vars.CLOUDFLARE_GATEWAY }}
          PUBLIC_SERVER_URL: ${{ vars.PUBLIC_SERVER_URL }}
          ADMIN: ${{ vars.ADMIN }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_CLIENT_ID: ${{ vars.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SKILL_AUDIT_GITHUB_REPO: ${{ vars.SKILL_AUDIT_GITHUB_REPO }}
          SKILL_AUDIT_GITHUB_WORKFLOW_FILE: ${{ vars.SKILL_AUDIT_GITHUB_WORKFLOW_FILE }}
          SKILL_AUDIT_GITHUB_WORKFLOW_REF: ${{ vars.SKILL_AUDIT_GITHUB_WORKFLOW_REF }}
          PULL_REQUEST: ${{ github.event.number }}
          GITHUB_SHA: ${{ github.sha }}

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: Cleanup Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed alchemy profile
        run: |
          mkdir -p "$HOME/.alchemy/credentials/default"
          printf '{"version":1,"profiles":{"default":{"cloudflare":{"metadata":{"id":"%s","name":"skills-re"},"method":"api-token"}}}}' \
            "$CLOUDFLARE_ACCOUNT_ID" > "$HOME/.alchemy/config.json"
          printf '{"type":"api-token","apiToken":"%s"}' \
            "$CLOUDFLARE_API_TOKEN" > "$HOME/.alchemy/credentials/default/cloudflare.json"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Safety check
        run: |
          if [ "${{ env.STAGE }}" = "prod" ]; then
            echo "ERROR: Cannot destroy prod environment in cleanup job"
            exit 1
          fi

      - name: Destroy preview environment
        working-directory: packages/infra
        run: bun alchemy destroy --stage ${{ env.STAGE }}
        env:
          ALCHEMY_PROFILE: default
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
